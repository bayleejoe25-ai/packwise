<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack-Wise</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="icon" href="https://files.catbox.moe/p7a6oa.png">
<link rel="apple-touch-icon" href="https://files.catbox.moe/p7a6oa.png">

<meta name="theme-color" content="#E36D9B">

<style>
:root{
   --royal:#2A4789;
   --emerald:#10B183;
   --lime:#A0CB75;
   --yellow:#E7DD6A;
   --pink:#E36D9B;
   --soft:#ffeaf2;
   --text:#1f2a44;
}

body{
   margin:0;
   font-family:'Montserrat',sans-serif;
   background:var(--soft);
   color:var(--text);
}

.container{
   max-width:1100px;
   margin:auto;
   padding:35px;
   border-radius:28px;
   background:white;
}

header h1{
   color:var(--pink);
   font-family:'Playfair Display',serif;
}

.subtitle{ color:var(--royal); }

.section-title{
   color:var(--emerald); /* FIX #3 */
   font-family:'Playfair Display',serif;
}

/* cards */
.card{
   background:white;
   border-radius:20px;
   padding:20px;
   margin-top:20px;
   border:2px solid #ffe0ec;
}

.card h3{
   color:var(--emerald); /* FIX #3 */
   font-family:'Playfair Display',serif;
}

/* keywords */
.keyword-chip{
   display:inline-block;
   background:var(--lime); /* FIX #4 */
   padding:8px 12px;
   border-radius:999px;
   margin:5px;
   font-weight:600;
}

.weather-box{
   border-left:6px solid var(--emerald);
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>Pack-Wise</h1>
<div class="subtitle">your travel planner</div>
</header>

<div class="card weather-box">
<h3>Weather</h3>
<p id="forecast"></p>
</div>

<div class="card">
<h3>Style Ideas</h3>

<p style="font-weight:600; margin-bottom:10px;">
Pinterest keywords to search:
</p>

<div id="keywords"></div>
</div>

<div class="card">
<h3>Clothing</h3>
<ul id="clothing"></ul>
</div>

<div class="card">
<h3>Toiletries</h3>
<ul id="toiletries"></ul>
</div>

<div class="card">
<h3>Shoes</h3>
<ul id="shoes"></ul>
</div>

<div class="card">
<h3>Tech</h3>
<ul id="tech"></ul>
</div>

<div class="card">
<h3>Travel</h3>
<ul id="travel"></ul>
</div>

<div class="card">
<h3>Extras</h3>
<ul id="extras"></ul>
</div>

</div>

<script>

function addList(id,items){
document.getElementById(id).innerHTML =
items.map(i=>`<li>${i}</li>`).join("");
}

function generatePlan(){

/* FIX #1 WEATHER */
document.getElementById("forecast").innerText =
"In Cozumel, Mexico it will be around 85–90°F. Warm, sunny, bright tropical energy. Bring sunglasses, sunscreen, and light breathable outfits.";

/* FIX #2 STYLE IDEAS */
document.getElementById("keywords").innerHTML = `
<span class="keyword-chip">cozumel beach outfits</span>
<span class="keyword-chip">tropical vacation aesthetic</span>
<span class="keyword-chip">beach sunset dresses</span>
<span class="keyword-chip">resort wear pinterest outfits</span>
<span class="keyword-chip">summer glow outfits 2026</span>
<span class="keyword-chip">vacation photo shoot ideas beach</span>
`;

/* KEEP REST THE SAME */
addList("clothing",["Outfits for days","Pajamas","Extra outfit"]);
addList("toiletries",["Basics","Skincare","Hair items"]);
addList("shoes",["Sneakers","Sandals"]);
addList("tech",["Charger","Headphones"]);
addList("travel",["ID","Phone","Wallet"]);
addList("extras",["Sunglasses","Water bottle"]);

document.getElementById("results").style.display="block";
}

</script>

</body>
</html>
