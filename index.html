<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack-Wise</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffe6f2,#fff3c9,#e6fff7);
  padding:20px;
}

h1{
  text-align:center;
  color:#ff2fb3;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0 12px;
  border-radius:10px;
  border:2px solid #ff2fb3;
}

button{
  width:100%;
  padding:12px;
  background:#ff2fb3;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.tag{
  display:inline-block;
  padding:8px 12px;
  margin:4px;
  background:#c8ff4f;
  border-radius:999px;
  cursor:pointer;
  user-select:none;
}

.tag.active{
  background:#ff2fb3;
  color:white;
}

.card{
  background:white;
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  border:2px solid #ff2fb3;
}

h3{
  color:#00c98a;
}

h4{
  margin-bottom:5px;
}
</style>
</head>

<body>

<h1>Pack-Wise</h1>

<input id="destination" placeholder="Destination city">
<input id="from" placeholder="From location">

<input type="date" id="start">
<input type="date" id="end">

<select id="transport">
<option value="plane">Plane ✈️</option>
<option value="car">Car 🚗</option>
<option value="train">Train 🚆</option>
<option value="bus">Bus 🚌</option>
</select>

<select id="style">
<option value="coquette">Coquette 🎀</option>
<option value="clean">Clean Girl ✨</option>
<option value="streetwear">Streetwear 👟</option>
<option value="boho">Boho 🌼</option>
<option value="aesthetic">Aesthetic 🌈</option>
<option value="minimal">Minimal 🤍</option>
</select>

<select id="laundry">
<option value="yes">Laundry available</option>
<option value="no">No laundry</option>
</select>

<button onclick="generate()">Generate Packing Plan</button>

<!-- ACTIVITIES -->
<div style="margin-top:10px">
<div class="tag" onclick="toggle(this,'beach')">Beach</div>
<div class="tag" onclick="toggle(this,'lake')">Lake</div>
<div class="tag" onclick="toggle(this,'shopping')">Shopping</div>
<div class="tag" onclick="toggle(this,'dining')">Dining</div>
<div class="tag" onclick="toggle(this,'outdoor')">Outdoor</div>
<div class="tag" onclick="toggle(this,'water')">Water</div>
<div class="tag" onclick="toggle(this,'entertainment')">Entertainment</div>
<div class="tag" onclick="toggle(this,'sightseeing')">Sightseeing</div>
<div class="tag" onclick="toggle(this,'exploring')">Exploring</div>
<div class="tag" onclick="toggle(this,'relaxing')">Relaxing</div>
<div class="tag" onclick="toggle(this,'sports')">Sports</div>
<div class="tag" onclick="toggle(this,'nightlife')">Nightlife</div>
<div class="tag" onclick="toggle(this,'nature')">Nature</div>
<div class="tag" onclick="toggle(this,'travel')">Travel</div>
<div class="tag" onclick="toggle(this,'social')">Social</div>
<div class="tag" onclick="toggle(this,'creative')">Creative</div>
<div class="tag" onclick="toggle(this,'events')">Events</div>
<div class="tag" onclick="toggle(this,'casual')">Casual</div>
<div class="tag" onclick="toggle(this,'adventure')">Adventure</div>
<div class="tag" onclick="toggle(this,'photos')">Photos</div>
<div class="tag" onclick="toggle(this,'fancy')">Fancy</div>
</div>

<div id="output"></div>

<script>

let tags = [];

function toggle(el,val){
  el.classList.toggle("active");

  if(tags.includes(val)){
    tags = tags.filter(t => t !== val);
  } else {
    tags.push(val);
  }
}

/* WEATHER */
async function getWeather(city){

  const API_KEY = "7997c2eada9c646c76f77b85edf3fc23";

  try{
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=imperial&appid=${API_KEY}`
    );

    const data = await res.json();

    if(!data.main) return "Weather not available";

    return `${Math.round(data.main.temp)}°F, ${data.weather[0].description}`;
  } catch {
    return "Weather error";
  }
}

/* GENERATE */
async function generate(){

  const city = document.getElementById("destination").value;
  const transport = document.getElementById("transport").value;
  const style = document.getElementById("style").value;
  const laundry = document.getElementById("laundry").value;

  const weather = await getWeather(city);

  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  let days = 5;
  if(start && end){
    days = Math.ceil((new Date(end)-new Date(start))/(1000*60*60*24))+1;
  }

  document.getElementById("output").innerHTML = `

  <div class="card">
    <h3>Weather</h3>
    <p>${weather}</p>
  </div>

  <div class="card">
    <h3>Transport</h3>
    <p>${transport}</p>
  </div>

  <div class="card">
    <h3>Style</h3>
    <p>${style}</p>
  </div>

  <!-- PINTEREST -->
  <div class="card">
    <h3>Style Keywords (Pinterest)</h3>
    <p>Search these on Pinterest for outfit inspo:</p>
    <ul>
      ${style === "coquette" ? `
        <li>coquette outfits</li>
        <li>pink aesthetic outfits</li>
        <li>soft girl summer</li>
      ` : ""}

      ${style === "clean" ? `
        <li>clean girl outfits</li>
        <li>minimal summer outfits</li>
        <li>neutral travel fits</li>
      ` : ""}

      ${style === "streetwear" ? `
        <li>streetwear outfits summer</li>
        <li>baggy airport outfits</li>
        <li>urban aesthetic fits</li>
      ` : ""}

      ${style === "boho" ? `
        <li>boho summer outfits</li>
        <li>flowy vacation dresses</li>
        <li>earthy aesthetic outfits</li>
      ` : ""}

      ${style === "aesthetic" ? `
        <li>aesthetic outfits pinterest</li>
        <li>cute travel outfits</li>
        <li>trendy summer fits</li>
      ` : ""}

      ${style === "minimal" ? `
        <li>minimal outfits aesthetic</li>
        <li>capsule wardrobe travel</li>
        <li>simple chic outfits</li>
      ` : ""}
    </ul>
  </div>

  <div class="card">
    <h3>Activities</h3>
    <p>${tags.length ? tags.join(", ") : "None selected"}</p>
  </div>

  <!-- PACKING CHECKLIST -->
  <div class="card">
    <h3>Packing Checklist</h3>

    <h4>Clothing</h4>
    <label><input type="checkbox"> ${Math.min(days,10)} Tops</label><br>
    <label><input type="checkbox"> ${Math.ceil(days/3)} Bottoms</label><br>
    <label><input type="checkbox"> ${days} Underwear</label><br>
    <label><input type="checkbox"> ${days} Socks</label><br>
    <label><input type="checkbox"> Pajamas</label>

    <h4>Shoes</h4>
    <label><input type="checkbox"> Everyday Shoes</label><br>
    <label><input type="checkbox"> Activity Shoes</label><br>
    ${tags.includes("fancy") ? '<label><input type="checkbox"> Dress Shoes</label>' : ""}

    <h4>Toiletries</h4>
    <label><input type="checkbox"> Toothbrush</label><br>
    <label><input type="checkbox"> Deodorant</label><br>
    <label><input type="checkbox"> Skincare</label><br>
    <label><input type="checkbox"> Sunscreen</label>

    <h4>Tech</h4>
    <label><input type="checkbox"> Charger</label><br>
    <label><input type="checkbox"> Portable Charger</label><br>
    <label><input type="checkbox"> Headphones</label>

    <h4>Extras</h4>
    <label><input type="checkbox"> Sunglasses</label><br>
    <label><input type="checkbox"> Water Bottle</label><br>
    <label><input type="checkbox"> Jacket</label>
  </div>

  <div class="card">
    <h3>Day by Day</h3>
    <ul>
      ${Array.from({length: Math.min(days,7)},(_,i)=>
        `<li>Day ${i+1}: ${style} outfit plan</li>`
      ).join("")}
    </ul>
  </div>

  `;
}

</script>

</body>
</html>
