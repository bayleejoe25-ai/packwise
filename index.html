<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>୨ৎ Pack-Wise ୨ৎ</title>
    <style>
        /* Pinterest Aesthetic Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --soft-pink: #fceef5;
            --rose: #ffc4d6;
            --sage: #d8e2dc;
            --cream: #fffaf0;
            --text: #6b705c;
            --accent: #b7b7a4;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cream);
            background-image: radial-gradient(#fceef5 1px, transparent 1px);
            background-size: 20px 20px; /* Subtle dot pattern like a journal */
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(183, 183, 164, 0.2);
            border: 1px solid var(--soft-pink);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--text);
            margin: 0;
            font-style: italic;
            font-weight: 400;
        }

        .bow {
            color: var(--rose);
            font-size: 1.5rem;
            margin: 10px 0;
            display: block;
        }

        label {
            display: block;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--accent);
        }

        .input-box {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--sage);
            background: transparent;
            padding: 10px 0;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-bottom: 30px;
            transition: 0.3s;
            color: var(--text);
        }

        .input-box:focus {
            outline: none;

<body>

<div class="container">
    <header>
        <span class="bow">୨ৎ</span>
        <h1>Pack-Wise</h1>
        <p style="font-size: 0.8rem; letter-spacing: 1px; color: var(--accent);">CURATING YOUR TRAVEL STORY</p>
    </header>

    <label>Destination</label>
    <input type="text" id="dest" class="input-box" placeholder="Where are we drifting to?">

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div>
            <label>The Season</label>
            <select id="season" class="input-box">
                <option value="warm">Golden Summer</option>
                <option value="fresh">Petal Spring</option>
                <option value="crisp">Amber Fall</option>
                <option value="chill">Velvet Winter</option>
            </select>
        </div>
        <div>
            <label>Trip Vibe</label>
            <select id="tripType" class="input-box">
                <option value="camp">Summer Camp 🏕️</option>
                <option value="reunion">Family Heritage 🏠</option>
                <option value="city">City Aesthetic 🏙️</option>
                <option value="beach">Ocean Air 🌴</option>
                <option value="concert">Loud Music 🎤</option>
            </select>
        </div>
    </div>

    <label>The Schedule</label>
    <div class="tag-group">
        <div class="tag" onclick="toggleTag(this, 'dinner')">Elegant Dinner</div>
        <div class="tag" onclick="toggleTag(this, 'swim')">Lakeside/Pool</div>
        <div class="tag" onclick="toggleTag(this, 'hiking')">Early Morning Hike</div>
        <div class="tag" onclick="toggleTag(this, 'photos')">Moodboard Photos</div>
        <div class="tag" onclick="toggleTag(this, 'church')">Morning Service</div>
    </div>

    <label>Official Checklist Importer</label>
    <textarea id="manualList" class="input-box" placeholder="Paste your camp list here..."></textarea>

    <button class="main-btn" onclick="generatePinterest()">Plan My Aesthetic</button>

    <div id="results" class="results">
        
        <div class="moodboard-card" style="background-color: var(--soft-pink); border:none;">
            <div class="card-title">The Forecast</div>
            <p id="weatherText" style="font-size: 0.9rem;"></p>
        </div>

        <div class="moodboard-card">
            <div class="card-title">The Lookbook</div>
            <div id="lookbook"></div>
        </div>

        <div class="moodboard-card">
            <div class="card-title">Essential Inventory</div>
            <ul id="inventory"></ul>
        </div>

        <div id="checklistCard" class="moodboard-card">
            <div class="card-title">The Official List</div>
            <ul id="manualItems"></ul>
        </div>

    </div>
</div>

<script>
    let activeTags = [];
    function toggleTag(el, tag) {
        el.classList.toggle('active');
        if(activeTags.includes(tag)) activeTags = activeTags.filter(t => t !== tag);
        else activeTags.push(tag);
    }

    function generatePinterest() {
        const dest = document.getElementById('dest').value || "Somewhere Lovely";
        const season = document.getElementById('season').value;
        const tripType = document.getElementById('tripType').value;
        const manual = document.getElementById('manualList').value;

        // Weather
        const weather = document.getElementById('weatherText');
        if(season === 'warm') weather.innerText = `Golden hours in ${dest} will be warm. Think breathable fabrics and plenty of hydration.`;
        else if(season === 'fresh') weather.innerText = `Soft breezes in ${dest}. A light knit or trench coat is essential for the aesthetic.`;
        else if(season === 'crisp') weather.innerText = `Cooler days ahead. Bring your favorite oversized scarf and cozy boots.`;
        else weather.innerText = `Crisp air in ${dest}. Velvet textures and thermal layers will keep you cozy.`;

        // Lookbook
        const lookbook = document.getElementById('lookbook');
        lookbook.innerHTML = "";
        let looks = [];

        if(tripType === 'camp') {
            looks.push({vibe: "Cozy Camp", desc: "Oversized hoodie + ribbed bike shorts + white crew socks."});
            looks.push({vibe: "Active Girl", desc: "Matching yoga set + sleek ponytail + hydroflask."});
        } else if(tripType === 'city') {
            looks.push({vibe: "Clean Girl", desc: "Wide leg trousers + baby tee + gold hoops."});
        } else if(tripType === 'beach') {
            looks.push({vibe: "Ocean Breeze", desc: "Linen set + straw bag + shell accessories."});
        }

        if(activeTags.includes('dinner')) looks.push({vibe: "Evening Elegance", desc: "Satin slip dress + kitten heels + ribbon in hair."});
        if(activeTags.includes('photos')) looks.push({vibe: "Picture Perfect", desc: "Sundress with puff sleeves + vintage camera."});

        looks.forEach(l => {
            lookbook.innerHTML += `<div class="outfit-item"><span class="vibe-tag">${l.vibe}</span><br>${l.desc}</div>`;
        });

        // Inventory
        const inventory = document.getElementById('inventory');
        inventory.innerHTML = `
            <li>5 Tops (Mix of basics & statement pieces)</li>
            <li>3 Bottoms (Denim, Trouser, Short)</li>
            <li>Days + 2 "Safety" Undergarments</li>
            <li>1 Pair Sneakers, 1 Pair Sandals/Heels</li>
            <li>Signature Scent & SPF 50</li>
        `;

        // Manual List
        const manualItems = document.getElementById('manualItems');
        const checklistCard = document.getElementById('checklistCard');
        manualItems.innerHTML = "";
        if(manual) {
            checklistCard.style.display = "block";
            manual.split('\n').forEach(line => {
                if(line.trim()) manualItems.innerHTML += `<li><input type="checkbox"> ${line}</li>`;
            });
        } else {
            checklistCard.style.display = "none";
        }

        document.getElementById('results').style.display = "block";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
