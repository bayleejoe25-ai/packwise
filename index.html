<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pack-Wise</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" href="https://files.catbox.moe/p7a6oa.png">
<link rel="apple-touch-icon" href="https://files.catbox.moe/p7a6oa.png">

<meta name="theme-color" content="#E36D9B">

<style>
:root{

   /* YOUR ACTUAL PALETTE */
   --royal-blue:#2A4789;
   --emerald:#10B183;
   --limeade:#A0CB75;
   --canary:#E7DD6A;
   --watermelon:#E36D9B;

   --white:#ffffff;
   --bg:#ffffff;
   --text:#1f2a44;
}

*{box-sizing:border-box;}

body{
   margin:0;
   padding:30px 15px;
   font-family:'Montserrat',sans-serif;
   background:var(--bg);
   color:var(--text);
}

/* CONTAINER */
.container{
   max-width:1100px;
   margin:auto;
   background:white;
   border-radius:28px;
   padding:40px;
   box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */
header{
   text-align:center;
   margin-bottom:40px;
}

header h1{
   font-family:'Playfair Display',serif;
   font-size:4rem;
   margin:0;
   color:var(--royal-blue);
}

.subtitle{
   color:var(--watermelon);
   letter-spacing:2px;
   font-size:0.85rem;
}

/* SECTION TITLES */
.section-title{
   font-family:'Playfair Display',serif;
   font-size:1.6rem;
   margin-bottom:15px;
   color:var(--royal-blue);
}

/* INPUTS */
.input-grid{
   display:grid;
   grid-template-columns:1fr 1fr;
   gap:20px;
}

label{
   display:block;
   margin-bottom:8px;
   font-size:0.8rem;
   letter-spacing:1px;
   text-transform:uppercase;
   font-weight:600;
   color:var(--royal-blue);
}

input,select{
   width:100%;
   padding:14px;
   border-radius:14px;
   border:2px solid #dbe7ff;
   font-size:1rem;
}

input:focus,select:focus{
   outline:none;
   border-color:var(--watermelon);
}

/* TAGS */
.tag-group{
   display:flex;
   flex-wrap:wrap;
   gap:10px;
}

.tag{
   background:var(--limeade);
   padding:10px 16px;
   border-radius:999px;
   cursor:pointer;
   font-weight:600;
   color:#1f2a44;
}

.tag.active{
   background:var(--watermelon);
   color:white;
}

/* BUTTON */
button{
   width:100%;
   padding:18px;
   border:none;
   border-radius:16px;
   background:var(--watermelon);
   color:white;
   font-weight:700;
   font-size:1rem;
   cursor:pointer;
}

/* CARDS */
.card{
   background:white;
   border-radius:20px;
   padding:22px;
   margin-top:20px;
   border:2px solid #f1f5ff;
}

.card h3{
   color:var(--royal-blue);
   font-family:'Playfair Display',serif;
}

/* CHIP */
.keyword-chip{
   display:inline-block;
   background:var(--canary);
   padding:8px 14px;
   border-radius:999px;
   margin:6px;
   font-weight:600;
}

/* WEATHER */
.weather-box{
   border-left:6px solid var(--emerald);
   background:#f3fffb;
}

/* RESULTS */
.results{display:none;margin-top:40px;}

.footer-note{
   text-align:center;
   margin-top:30px;
   color:var(--watermelon);
}

/* RESPONSIVE */
@media(max-width:768px){
   .input-grid{grid-template-columns:1fr;}
   header h1{font-size:2.8rem;}
}
</style>
</head>

<body>

<div class="container">

<header>
   <div style="font-size:2rem;">✈️</div>
   <h1>Pack-Wise</h1>
   <div class="subtitle">YOUR TRAVEL PLANNER</div>
</header>

<div class="section-title">Trip Details</div>

<div class="input-grid">

<input id="tripName" placeholder="Trip name">
<input id="fromLocation" placeholder="From">
<input id="toLocation" placeholder="To">

<input type="date" id="startDate">
<input type="date" id="endDate">

<select id="travelMethod">
<option value="flying">Flying</option>
<option value="driving">Driving</option>
</select>

<select id="style">
<option value="coquette">Coquette</option>
<option value="clean">Clean Girl</option>
<option value="sporty">Sporty</option>
</select>

<select id="laundry">
<option value="yes">Laundry yes</option>
<option value="no">Laundry no</option>
</select>

</div>

<div class="section-title">Activities</div>

<div class="tag-group">
<div class="tag" onclick="toggleTag(this,'beach')">Beach</div>
<div class="tag" onclick="toggleTag(this,'pool')">Pool</div>
<div class="tag" onclick="toggleTag(this,'fancy')">Fancy</div>
<div class="tag" onclick="toggleTag(this,'photos')">Photos</div>
</div>

<br>

<button onclick="generatePlan()">Generate</button>

<div class="results" id="results">

<div class="card">
<h3 id="bannerTitle"></h3>
<p id="countdown"></p>
</div>

<div class="card weather-box">
<h3>Weather</h3>
<p id="forecast"></p>
</div>

<div class="card">
<h3>Style Ideas</h3>
<div id="keywords"></div>
</div>

<div class="card">
<h3>Clothing</h3>
<ul id="clothing"></ul>
</div>

</div>

</div>

<script>
let activeTags=[];

function toggleTag(el,tag){
el.classList.toggle("active");
activeTags.includes(tag)
? activeTags=activeTags.filter(t=>t!==tag)
:activeTags.push(tag);
}

function addList(id,items){
document.getElementById(id).innerHTML=
items.map(i=>`<li>${i}</li>`).join("");
}

function generatePlan(){

const tripName=document.getElementById("tripName").value||"Trip";
const start=new Date(document.getElementById("startDate").value);
const end=new Date(document.getElementById("endDate").value);

if(isNaN(start)||isNaN(end))return;

const days=Math.ceil((end-start)/86400000)+1;

document.getElementById("bannerTitle").innerText=tripName;

document.getElementById("countdown").innerText=
Math.ceil((start-new Date())/86400000)+" days left";

document.getElementById("forecast").innerText=
"Warm, bright, summer vibes.";

addList("clothing",[`${days} outfits`,`Pajamas`]);

document.getElementById("results").style.display="block";
}
</script>

</body>
</html>
